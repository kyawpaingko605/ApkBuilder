name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # တိုက်ရိုက် APK ထွက်စေမည့် အမိန့်စာသားသို့ ပြောင်းလဲထားခြင်း
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # ထွက်လာသည့် APK ကို သိမ်းဆည်းရန် လမ်းကြောင်းအမှန် ပြင်ဆင်ထားခြင်း
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ApkBuilder-debug
        path: app/build/outputs/apk/debug/*.apk
